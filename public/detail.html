<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snippet — Nimzz Snippets</title>
  <link rel="icon" href="/icons/favicon.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Nimzz<span style="color:var(--accent)">.</span>
    </div>
    <button class="sidebar-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Navigation</div>
    <a href="/" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
    <a href="/explore.html" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Explore</a>
    <a href="https://t.me/Nimzz4" target="_blank" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Telegram</a>
    <a href="https://github.com/NimzzMihate" target="_blank" class="sidebar-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>GitHub</a>
  </div>
</aside>

<nav>
  <a href="/" class="nav-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    Nimzz<span style="color:var(--accent)">.</span>
    <span class="nav-ver">v1.0.0</span>
  </a>
  <div class="nav-right">
    <a href="/explore.html" class="nav-link">Explore</a>
    <a href="https://github.com/NimzzMihate" target="_blank" class="nav-link">GitHub</a>
    <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="detail-page" id="detailPage">
  <div class="loading"><span></span><span></span><span></span></div>
</div>

<footer>
  <div class="footer-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    Nimzz Snippets
  </div>
  <div class="footer-links">
    <a href="https://github.com/NimzzMihate" target="_blank">GitHub</a>
    <a href="https://t.me/Nimzz4" target="_blank">Telegram</a>
    <a href="https://wa.me/6282137487477" target="_blank">WhatsApp</a>
  </div>
  <div class="footer-right">© 2026 Nimzz. All rights reserved.</div>
</footer>

<script>
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open') }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open') }

const id = new URLSearchParams(location.search).get('id')
let snippetData = null

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

function copyCode() {
  if (!snippetData?.code) return
  navigator.clipboard.writeText(snippetData.code)
  const btn = document.getElementById('copyBtn')
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`
  setTimeout(() => btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`, 2000)
}

function downloadCode() {
  if (!snippetData?.code) return
  const blob = new Blob([snippetData.code], { type: 'text/javascript' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = snippetData.name || 'snippet.js'
  a.click()
}

function renderDetail(s) {
  snippetData = s
  document.title = `${s.name} — Nimzz Snippets`
  const page = document.getElementById('detailPage')

  const codeContent = s.locked ? `
    <div class="locked-box">
      <div class="locked-icon">🔒</div>
      <div class="locked-title">Protected Code</div>
      <div class="locked-sub">Snippet ini dikunci. Masukkan password untuk membuka akses.</div>
      <div class="locked-form">
        <input class="locked-input" type="password" id="passInput" placeholder="Enter password..." onkeydown="if(event.key==='Enter')unlock()"/>
        <button class="locked-btn" onclick="unlock()">UNLOCK SNIPPET</button>
        <p id="errMsg" style="color:var(--red);font-size:.8rem;display:none">Password salah!</p>
      </div>
    </div>` : `
    <div class="code-header">
      <div class="code-dots"><span class="dot-red"></span><span class="dot-yellow"></span><span class="dot-green"></span></div>
      <div class="code-actions">
        <button class="code-btn" id="copyBtn" onclick="copyCode()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy
        </button>
        <button class="code-btn" onclick="downloadCode()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download
        </button>
      </div>
    </div>
    <pre>${escapeHtml(s.code || '')}</pre>`

  page.innerHTML = `
    <a href="/explore.html" style="color:var(--muted);text-decoration:none;font-size:.85rem;display:inline-flex;align-items:center;gap:.4rem;margin-bottom:2rem">← Back to Explore</a>
    <h1 class="detail-title">${s.name}</h1>
    <div class="detail-meta">
      <span class="tag tag-lang">${s.language}</span>
      <span class="tag tag-cat">${s.category}</span>
      <span class="tag" style="background:rgba(255,255,255,.05);color:var(--muted)">👤 ${s.author}</span>
      <span class="tag" style="background:rgba(255,255,255,.05);color:var(--muted)">📅 ${s.date}</span>
      ${s.protected ? '<span class="tag tag-lock">🔒 Protected</span>' : ''}
    </div>
    <div class="code-box">${codeContent}</div>`
}

async function unlock() {
  const pass = document.getElementById('passInput').value
  const err = document.getElementById('errMsg')
  try {
    const res = await fetch(`/api/snippets/${id}/unlock`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pass })
    })
    const { status, data } = await res.json()
    if (!status) { err.style.display = 'block'; return }
    err.style.display = 'none'
    renderDetail(data)
  } catch { err.style.display = 'block' }
}

async function init() {
  if (!id) { document.getElementById('detailPage').innerHTML = '<p class="empty">Snippet tidak ditemukan.</p>'; return }
  try {
    const res = await fetch(`/api/snippets/${id}`)
    const { data } = await res.json()
    if (!data) { document.getElementById('detailPage').innerHTML = '<p class="empty">Snippet tidak ditemukan.</p>'; return }
    renderDetail(data)
  } catch { document.getElementById('detailPage').innerHTML = '<p class="empty">Gagal memuat snippet.</p>' }
}

init()
</script>
</body>
</html>
