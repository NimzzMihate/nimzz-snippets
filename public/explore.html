<div class="explore-hero">

<script>
function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('open') }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open') }

let allSnippets = []
let activeCategory = 'All'

const params = new URLSearchParams(location.search)
if (params.get('cat')) activeCategory = params.get('cat')

function renderSnippets(data) {
  const grid = document.getElementById('grid')
  if (!data.length) { grid.innerHTML = '<p class="empty">Tidak ada snippet ditemukan.</p>'; return }
  grid.innerHTML = data.map(s => `
    <a href="/detail.html?id=${s.id}" class="snippet-card">
      <div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></div>
      <div class="card-name">${s.name}</div>
      <div class="card-meta">
        <span class="tag tag-lang">${s.language}</span>
        <span class="tag tag-cat">${s.category}</span>
        ${s.protected ? '<span class="tag tag-lock">🔒 Protected</span>' : ''}
      </div>
      <span class="card-arrow">→</span>
    </a>`).join('')
}

function filterSnippets() {
  const q = document.getElementById('searchInput').value.toLowerCase()
  let result = allSnippets
  if (activeCategory !== 'All') result = result.filter(s => s.category === activeCategory)
  if (q) result = result.filter(s => s.name.toLowerCase().includes(q) || s.category.toLowerCase().includes(q) || s.author.toLowerCase().includes(q))
  renderSnippets(result)
}

function setCategory(cat) {
  activeCategory = cat
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat))
  filterSnippets()
}

async function init() {
  try {
    const [sRes, cRes] = await Promise.all([fetch('/api/snippets'), fetch('/api/categories')])
    const { data } = await sRes.json()
    const { data: cats } = await cRes.json()
    allSnippets = data

    const catsBar = document.getElementById('catsBar')
    catsBar.innerHTML = cats.map(c => `<button class="cat-btn${c === activeCategory ? ' active' : ''}" data-cat="${c}" onclick="setCategory('${c}')">${c}</button>`).join('')

    filterSnippets()
  } catch { document.getElementById('grid').innerHTML = '<p class="empty">Gagal memuat snippets.</p>' }
}

init()
</script>
